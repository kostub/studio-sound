name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(github.event.action == 'synchronize' && '["windows-latest"]' || '["windows-latest", "macos-latest"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache-dependency-path: sidecar/go.mod

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          golangci-lint --version

      - name: Install go-jsonschema
        run: |
          go install github.com/atombender/go-jsonschema@v0.18.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install cargo-typify
        run: cargo install cargo-typify --version 0.6.2 --locked

      - name: Install dependencies
        run: npm ci

      - name: Cache ffprobe downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/studio-sound/ffprobe
          key: ffprobe-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('third_party/ffprobe.lock.json') }}

      - name: Fetch ffprobe
        run: npm run ffprobe:fetch

      - name: Verify ffprobe artifacts
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            artifact=app/src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe
          elif [ "$RUNNER_ARCH" = "ARM64" ]; then
            artifact=app/src-tauri/binaries/ffprobe-aarch64-apple-darwin
          else
            artifact=app/src-tauri/binaries/ffprobe-x86_64-apple-darwin
          fi
          ls -l "$artifact"
          test -s "$artifact" || { echo "no ffprobe artifact at $artifact"; exit 1; }

      - name: Generate schemas
        run: npm run gen:schemas

      - name: Assert codegen is clean
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Codegen produced a dirty tree. Run 'npm run gen:schemas' locally and commit the result."
            git status --porcelain
            git --no-pager diff
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Test (Rust)
        run: cargo test --manifest-path app/src-tauri/Cargo.toml --lib

      - name: Integration tests (sidecar E2E)
        env:
          STUDIO_FFPROBE_PATH: ${{ runner.os == 'Windows' && format('{0}\app\src-tauri\binaries\ffprobe-x86_64-pc-windows-msvc.exe', github.workspace) || (runner.arch == 'ARM64' && format('{0}/app/src-tauri/binaries/ffprobe-aarch64-apple-darwin', github.workspace) || format('{0}/app/src-tauri/binaries/ffprobe-x86_64-apple-darwin', github.workspace)) }}
        run: cd sidecar && go test -tags=integration ./...

      - name: Build sidecar
        run: npm run sidecar:build

      - name: Verify sidecar artifacts
        run: |
          node -e 'const fs = require("fs"); const paths = ["app/src-tauri/binaries/studio-sidecar-x86_64-pc-windows-msvc.exe", "app/src-tauri/binaries/studio-sidecar-x86_64-apple-darwin", "app/src-tauri/binaries/studio-sidecar-aarch64-apple-darwin"]; for (const path of paths) { if (!fs.existsSync(path)) { console.error("Missing " + path); process.exit(1); } }'

      - name: Build app
        run: npm run build -w app
